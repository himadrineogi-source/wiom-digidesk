name: Deploy to Vercel

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_SCOPE: himadrineogi-8356s-projects

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@50.33.1

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --scope "$VERCEL_SCOPE" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        run: vercel build --prod --scope "$VERCEL_SCOPE" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel output
        run: vercel deploy --prebuilt --prod --scope "$VERCEL_SCOPE" --token="${{ secrets.VERCEL_TOKEN }}"
